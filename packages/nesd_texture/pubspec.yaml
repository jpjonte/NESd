name: nesd_texture
description: "A new Flutter plugin project."
version: 0.0.1

environment:
  sdk: '>=3.10.0 <4.0.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.jpj.nesd_texture
        pluginClass: NesdTexturePlugin
      ios:
        pluginClass: NesdTexturePlugin
      linux:
        pluginClass: NesdTexturePlugin
      macos:
        pluginClass: NesdTexturePlugin
      windows:
        pluginClass: NesdTexturePluginCApi
