output: dist/
artifact_name: "{{name}}{{#channel}}-{{channel}}{{/channel}}-{{build_name}}({{build_number}}){{#is_profile}}-{{build_mode}}{{/is_profile}}-{{platform}}.{{ext}}"
releases:
  - name: prod-linux
    jobs:
      - name: prod-linux-deb
        package:
          platform: linux
          target: deb
          build_args:
            release: true
      - name: prod-linux-rpm
        package:
          platform: linux
          target: rpm
          build_args:
            release: true
  - name: dev-linux
    jobs:
      - name: dev-linux-deb
        package:
          platform: linux
          target: deb
          build_args:
            debug: true
      - name: dev-linux-rpm
        package:
          platform: linux
          target: rpm
          build_args:
            debug: true
  - name: prod-macos
    jobs:
      - name: prod-macos
        package:
          platform: macos
          target: dmg
          channel: prod
          build_args:
            flavor: prod
            release: true
  - name: dev-macos
    jobs:
      - name: dev-macos
        package:
          platform: macos
          target: dmg
          channel: dev
          build_args:
            flavor: dev
            debug: true
